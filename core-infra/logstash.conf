input {
  # Filebeat input for other container logs
  beats {
    port => 5044
  }

  # Direct socket input from Quarkus applications (ECS format)
  tcp {
    port => 5000
    codec => json_lines
    add_field => { "input_source" => "tcp_socket" }
  }
}

filter {
  # Detect direct socket logs from Quarkus (ECS format)
  if [input_source] == "tcp_socket" {
    mutate { 
      add_tag => ["quarkus_direct_socket", "application_log"]
      add_field => { "log_source" => "quarkus_socket" }
      add_field => { "log_type" => "application" }
    }
    
    # ECS format handling
    if [log] and [log][level] {
      mutate {
        add_field => { "log_level" => "%{[log][level]}" }
      }
    }
    
    if [message] {
      mutate {
        add_field => { "log_message" => "%{message}" }
      }
    }
    
    # Parse ECS timestamp if present
    if [@timestamp] {
      date {
        match => [ "@timestamp", "ISO8601" ]
        target => "@timestamp"
      }
    }
  }
  # Detect Filebeat logs
  else if [agent][type] == "filebeat" {
    mutate { 
      add_tag => ["filebeat_source", "docker_container_log"]
      add_field => { "log_source" => "filebeat" }
      add_field => { "log_type" => "container" }
    }
    
    # Parse JSON logs from containers if they are JSON formatted
    if [message] =~ /^\{.*\}$/ {
      json {
        source => "message"
        target => "parsed_json"
      }
      
      # If it's a Quarkus JSON log from container
      if [parsed_json][timestamp] and [parsed_json][level] {
        mutate {
          add_tag => ["quarkus_container_json"]
          replace => { "log_message" => "%{[parsed_json][message]}" }
          replace => { "log_level" => "%{[parsed_json][level]}" }
          replace => { "logger_name" => "%{[parsed_json][loggerName]}" }
        }
        
        # Parse timestamp
        date {
          match => [ "[parsed_json][timestamp]", "yyyy-MM-dd HH:mm:ss,SSS" ]
          target => "@timestamp"
        }
      }
    }
    # Handle plain text logs
    else {
      mutate {
        add_tag => ["plain_text_log"]
        add_field => { "log_message" => "%{message}" }
      }
      
      # Try to extract log level from plain text
      grok {
        match => { "message" => "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{LOGLEVEL:log_level}\s+%{GREEDYDATA:log_content}" }
        tag_on_failure => ["_grokparsefailure"]
      }
    }
    
    # Add container information
    if [container][name] {
      mutate {
        add_field => { "service_name" => "%{[container][name]}" }
      }
    }
  }
  # Fallback for other logs
  else {
    mutate { 
      add_tag => ["unknown_source"]
      add_field => { "log_source" => "unknown" }
      add_field => { "log_type" => "unknown" }
    }
  }
  
  # Clean up temporary fields
  if "quarkus_container_json" in [tags] {
    mutate {
      remove_field => ["parsed_json"]
    }
  }
}

output {
  # Direct socket logs from Quarkus (ECS format) - PRIORITY
  if "quarkus_direct_socket" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "quarkus-direct-logs-%{+YYYY.MM.dd}"
    }
  }
  # Container logs from Filebeat (fallback)
  else if "quarkus_container_json" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "quarkus-container-logs-%{+YYYY.MM.dd}"
    }
  }
  # Other Filebeat container logs
  else if "filebeat_source" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "container-logs-%{+YYYY.MM.dd}"
    }
  }
  # Other logs
  else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "misc-logs-%{+YYYY.MM.dd}"
    }
  }
  
  # Debug output
  stdout { 
    codec => rubydebug {
      metadata => true
    }
  }
}

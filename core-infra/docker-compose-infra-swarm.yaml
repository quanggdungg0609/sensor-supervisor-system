version: "3.8"

services:
  traefik:
    image: traefik:v2.10
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "5050:8080"
      - "1883:1883"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    configs:
      - source: traefik_config
        target: /etc/traefik/traefik.yml
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:mypassword"
    deploy:
      placement:
        constraints:
          - "node.hostname == u24serv-cac"

  mqtt-broker:
    image: emqx/emqx:5.3.0
    configs:
      - source: emqx_config
        target: /opt/emqx/etc/emqx.conf
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    restart: unless-stopped
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.emqx-mqtt.entrypoints=mqtt"
      - "traefik.tcp.routers.emqx-mqtt.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.emqx-mqtt.service=emqx-mqtt-svc"
      - "traefik.tcp.services.emqx-mqtt-svc.loadbalancer.server.port=1883"
    healthcheck:
      test: ["CMD", "emqx_ctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  # --- ELK STACK FOR LOGGING ---
  elasticsearch:
    image: docker.io/elastic/elasticsearch:8.14.1
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - "discovery.type=single-node"
      - "xpack.security.enabled=false" 
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  logstash:
    image: docker.io/elastic/logstash:8.14.1
    configs:
      - source: logstash_config
        target: /usr/share/logstash/pipeline/logstash.conf
    ports:
      - "12201:12201/udp"
      - "5044:5044"
      - "9600:9600"
    networks:
      - app-network
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  kibana:
    image: docker.io/elastic/kibana:8.14.1
    ports:
      - "5601:5601"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.1
    user: root 
    configs:
      - source: filebeat_config
        target: /usr/share/filebeat/filebeat.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - app-network
    deploy:
      mode: global
  # --- END OF ELK STACK ---

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  prometheus:
    image: prom/prometheus:latest
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    networks:
      - app-network
    deploy:
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasources_config
        target: /etc/grafana/provisioning/datasources/datasource.yml
      - source: grafana_dashboards_config
        target: /etc/grafana/provisioning/dashboards/dashboard.yml
      - source: grafana_dashboard_json
        target: /etc/grafana/provisioning/dashboards/client-dashboard.json
    networks:
      - app-network
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: password
      DOCKER_INFLUXDB_INIT_ORG: sss-quangdung
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry-data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  auth-acl-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth_acl_db
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus123
    volumes:
      - postgres_data_auth_acl_service:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - auth-acl-private-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  sss-auth-acl-service:
    image: 192.168.152.117:5000/quangdung/sss-auth-and-acl-service:latest
    environment:
      SERVICE_PORT: 2001
      DB_ADDRESS: auth-acl-db:5432
      DB_USERNAME: quarkus
      DB_PASSWORD: quarkus123
      DEVICE_SERVICE_API_URL: http://sss-device-service:2002/
      MQTT_BROKER_URL: mqtt://mqtt-broker:1883
      MQTT_ADMIN_USERNAME: admin
      MQTT_ADMIN_PASSWORD: admin123
      MQTT_ADMIN_CLIENTID: ADMINCLIENT
      BCRYPT_SALT_ROUNDS: 12
      BCRYPT_CUSTOM_SALT: $2a$12$abcdefghijklmnopqrstuv
      APP_SECRET_KEY: your-secret-key-here-change-in-production
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 12201
    restart: unless-stopped
    networks:
      - app-network
      - auth-acl-private-network
    healthcheck:
      # Kiểm tra endpoint liveness. Cần cài curl trong image nếu chưa có.
      # Hoặc dùng wget: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2001/q/health/live"]
      test: ["CMD", "curl", "-f", "http://localhost:2001/q/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s # Cho service thời gian để khởi động trước khi bắt đầu kiểm tra
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      placement:
        constraints:
          - "node.hostname == u24serv-cac"

  device-service-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: device_db
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus123
    volumes:
      - device-service-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - device-service-private-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      placement:
        constraints:
          - "node.hostname == u24serv-db"

  sss-device-service:
    image: 192.168.152.117:5000/quangdung/sss-device-service:latest
    environment:
      DB_ADDRESS: device-service-db:5432
      DB_USERNAME: quarkus
      DB_PASSWORD: quarkus123
      DB_GENERATION: update
      MQTT_AUTH_ACL_URL: http://sss-auth-acl-service:2001
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    restart: unless-stopped
    networks:
      - app-network
      - device-service-private-network
    # Thêm healthcheck cho service này tương tự như sss-auth-acl-service
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.hostname == u24serv-cac"

  sss-data-ingestor-serivce:
    image: 192.168.152.117:5000/quangdung/sss-data-ingestor-service:latest
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      MQTT_USER: admin
      MQTT_PASSWORD: admin123
      MQTT_CLIENT_ID: ADMINCLIENT
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.hostname == u24serv-cac"

  sss-telemetry-storage-service:
    image: 192.168.152.117:5000/quangdung/sss-telemetry-storage-service:latest
    networks:
      - app-network
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_URL: redis://redis:6379
      DEVICE_INFO_API_URL: http://sss-auth-acl-service:2001/
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: my-super-secret-token
      INFLUXDB_ORG: sss-quangdung
      INFLUXDB_BUCKET: telemetry-data
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.hostname == u24serv-cac"

volumes:
  emqx_data:
  emqx_log:
  grafana_data:
  redis_data:
  rabbitmq_data:
  influxdb_data:
  postgres_data_auth_acl_service:
  device-service-db-data:

networks:
  app-network:
    driver: overlay
    attachable: true
  auth-acl-private-network:
    driver: overlay
    attachable: true
  device-service-private-network:
    driver: overlay
    attachable: true

configs:
  traefik_config:
    external: true
  prometheus_config:
    external: true
  emqx_config:
    external: true
  grafana_datasources_config:
    external: true
  grafana_dashboards_config:
    external: true
  grafana_dashboard_json:
    external: true
  logstash_config:
    external: true
  filebeat_config:
    external: true

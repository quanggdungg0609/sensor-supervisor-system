version: "3.8"

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "5050:8080"
      - "1883:1883"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - infrastructure-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:mypassword"

  mqtt-broker:
    image: emqx/emqx:5.3.0
    container_name: shared-emqx-broker
    ports:
      - "8883:8883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    volumes:
      - ./emqx/etc/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    restart: unless-stopped
    networks:
      - infrastructure-network
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.emqx-mqtt.entrypoints=mqtt"
      - "traefik.tcp.routers.emqx-mqtt.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.emqx-mqtt.service=emqx-mqtt-svc"
      - "traefik.tcp.services.emqx-mqtt-svc.loadbalancer.server.port=1883"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "emqx_ctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- CENTRALIZED LOGGING STACK (ELK + Filebeat) ---
  elasticsearch:
    image: docker.io/elastic/elasticsearch:8.14.1
    container_name: elasticsearch
    environment:
      - "discovery.type=single-node"
      - "xpack.security.enabled=false"
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - infrastructure-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 10s
      timeout: 5s
      retries: 10

  logstash:
    image: docker.io/elastic/logstash:8.14.1
    container_name: logstash
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
      - "12201:12201/udp"
      - "9600:9600"
    networks:
      - infrastructure-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    labels:
      - "log.collection.ignore=true"

  kibana:
    image: docker.io/elastic/kibana:8.14.1
    container_name: kibana
    ports:
      - "5601:5601"
    networks:
      - infrastructure-network
    depends_on:
      elasticsearch:
        condition: service_healthy

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.1
    container_name: filebeat
    user: root
    volumes:
      - ./test.log:/tmp/test.log:ro


      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - infrastructure-network
    depends_on:
      - logstash
  # --- END OF LOGGING STACK ---

  redis:
    image: redis:7-alpine
    container_name: shared-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - infrastructure-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: shared-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - infrastructure-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    container_name: shared-prometheus-server
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - infrastructure-network

  grafana:
    image: grafana/grafana:latest
    container_name: shared-grafana-dashboard
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    networks:
      - infrastructure-network
    depends_on:
      - prometheus

  influxdb:
    image: influxdb:2.7-alpine
    container_name: shared-telemetry-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: password
      DOCKER_INFLUXDB_INIT_ORG: sss-quangdung
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry-data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped
    networks:
      - infrastructure-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth-acl-db:
    image: postgres:15-alpine
    container_name: auth-acl-postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auth_acl_db
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus123
    volumes:
      - postgres_data_auth_acl_service:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - auth-acl-private-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  sss-auth-acl-service:
    image: 192.168.152.117:5000/quangdung/sss-auth-and-acl-service:latest
    container_name: sss-auth-acl-service
    environment:
      SERVICE_PORT: 2001
      DB_ADDRESS: auth-acl-db:5432
      DB_USERNAME: quarkus
      DB_PASSWORD: quarkus123
      DEVICE_SERVICE_API_URL: http://sss-device-service:2002/
      MQTT_BROKER_URL: mqtt://mqtt-broker:1883
      MQTT_ADMIN_USERNAME: admin
      MQTT_ADMIN_PASSWORD: admin123
      MQTT_ADMIN_CLIENTID: ADMINCLIENT
      BCRYPT_SALT_ROUNDS: 12
      BCRYPT_CUSTOM_SALT: $2a$12$abcdefghijklmnopqrstuv
      APP_SECRET_KEY: your-secret-key-here-change-in-production
      # Simple logging configuration
      LOG_LEVEL: INFO
      CONSOLE_LOG_LEVEL: INFO
      ENVIRONMENT: production
    restart: unless-stopped
    networks:
      - infrastructure-network
      - auth-acl-private-network
    depends_on:
      - mqtt-broker
      - redis
      - auth-acl-db
      - sss-device-service
      - logstash

  device-service-db:
    image: postgres:15-alpine
    container_name: device-service-app-db
    environment:
      POSTGRES_DB: device_db
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus123
    volumes:
      - device-service-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - device-service-private-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  sss-device-service:
    image: 192.168.152.117:5000/quangdung/sss-device-service:latest
    container_name: sss-device-service
    environment:
      DB_ADDRESS: device-service-db:5432
      DB_USERNAME: quarkus
      DB_PASSWORD: quarkus123
      DB_GENERATION: update
      MQTT_AUTH_ACL_URL: http://sss-auth-acl-service:2001
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    restart: unless-stopped
    networks:
      - infrastructure-network
      - device-service-private-network
    depends_on:
      - rabbitmq
      - device-service-db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.device-api.rule=PathPrefix(`/devices-service`)"
      - "traefik.http.routers.device-api.entrypoints=http"
      - "traefik.http.services.device-api-svc.loadbalancer.server.port=2002"
      - "traefik.http.routers.device-api.middlewares=strip-device-prefix"
      - "traefik.http.middlewares.strip-device-prefix.stripprefix.prefixes=/devices-service"

  sss-data-ingestor-serivce:
    image: 192.168.152.117:5000/quangdung/sss-data-ingestor-service:latest
    container_name: sss-data-ingestor-serivce
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      MQTT_USER: admin
      MQTT_PASSWORD: admin123
      MQTT_CLIENT_ID: ADMINCLIENT
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - mqtt-broker
      - sss-auth-acl-service
    networks:
      - infrastructure-network

  sss-telemetry-storage-service:
    image: 192.168.152.117:5000/quangdung/sss-telemetry-storage-service:latest
    container_name: sss-telemetry-storage-service
    networks:
      - infrastructure-network
      - services-network
    depends_on:
      - rabbitmq
      - influxdb
      - sss-data-ingestor-serivce
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_URL: redis://redis:6379
      DEVICE_INFO_API_URL: http://sss-auth-acl-service:2001/
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: my-super-secret-token
      INFLUXDB_ORG: sss-quangdung
      INFLUXDB_BUCKET: telemetry-data

volumes:
  emqx_data: {}
  emqx_log: {}
  grafana_data: {}
  redis_data: {}
  rabbitmq_data: {}
  influxdb_data: {}
  postgres_data_auth_acl_service: {}
  device-service-db-data: {}
  elasticsearch_data: {}

networks:
  shared-network:
    driver: bridge
  infrastructure-network:
    driver: bridge
  services-network:
    driver: bridge
  auth-acl-private-network:
    driver: bridge
    internal: false
  device-service-private-network:
    driver: bridge
    internal: false

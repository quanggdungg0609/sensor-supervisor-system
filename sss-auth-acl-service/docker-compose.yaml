services:
  # MQTT Broker - EMQX
  mqtt-broker:
    image: emqx/emqx:5.3.0
    container_name: emqx-broker
    ports:
      - "1883:1883"      # MQTT/TCP
      - "8883:8883"      # MQTT/SSL
      - "8083:8083"      # MQTT/WS
      - "8084:8084"      # MQTT/WSS
      - "18083:18083"    # Dashboard
    volumes:
      - ./emqx/etc/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    restart: unless-stopped
    networks:
      - sensor-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # PostgreSQL Database
  auth-acl-db:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sensor_db
      - POSTGRES_USER=quarkus
      - POSTGRES_PASSWORD=quarkus123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - sensor-network

  # Auth ACL Service with JSON logging to Logstash
  sss-auth-acl-service:
    image: 192.168.152.117:5000/quangdung/sss-auth-and-acl-service:1.0.2.9-SNAPSHOT
    container_name: sss-auth-acl-service
    environment:
      - SERVICE_PORT=2001
      - DB_ADDRESS=auth-acl-db:5432
      - DB_USERNAME=quarkus
      - DB_PASSWORD=quarkus123
      - LOG_LEVEL=INFO
      - CONSOLE_LOG_LEVEL=INFO
      - ENVIRONMENT=development
    ports:
      - "2001:2001"
    depends_on:
      - auth-acl-db
      - mqtt-broker
    networks:
      - sensor-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,version,environment"
    labels:
      - "service=auth-and-acl-service"
      - "version=1.0.2.3-SNAPSHOT"
      - "environment=development"
      - "log.collection.enabled=true"

volumes:
  postgres_data:
  pgadmin_data:
  emqx_data:
  emqx_log:

networks:
  sensor-network:
    driver: bridge